<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ thống Quản lý Sinh viên</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>

<body>

  <div class="container mt-5">
    <h2 class="text-center mb-4 text-primary">QUẢN LÝ SINH VIÊN</h2>

    <div class="row mb-3">
      <div class="col-md-8">
        <div class="input-group">
          <input type="text" id="searchName" class="form-control" placeholder="Nhập tên sinh viên...">
          <button class="btn btn-primary" onclick="searchStudent()">Tìm kiếm</button>
        </div>
      </div>
      <div class="col-md-4 text-end">
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#studentModal" onclick="prepareAdd()">+
          Thêm mới</button>
      </div>
    </div>

    <table class="table table-hover table-striped">
      <thead class="table-dark">
        <tr>
          <th>Tên</th>
          <th>Tuổi</th>
          <th>Lớp</th>
          <th>Email</th>
          <th>SĐT</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody id="studentTableBody"></tbody>
    </table>
  </div>

  <div class="modal fade" id="studentModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Thông tin sinh viên</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="studentId">
          <div class="mb-3"><label>Họ tên</label><input type="text" id="name" class="form-control"></div>
          <div class="mb-3"><label>Tuổi</label><input type="number" id="age" class="form-control"></div>
          <div class="mb-3"><label>Email</label><input type="email" id="email" class="form-control"></div>
          <div class="mb-3"><label>Lớp</label><input type="text" id="className" class="form-control"></div>
          <div class="mb-3"><label>SĐT</label><input type="text" id="phoneNumber" class="form-control"></div>
          <div class="mb-3"><label>Địa chỉ</label><input type="text" id="address" class="form-control"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
          <button type="button" class="btn btn-primary" onclick="saveStudent()">Lưu lại</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_URL = "/api/students";
    let studentModal;

    document.addEventListener("DOMContentLoaded", () => {
      studentModal = new bootstrap.Modal(document.getElementById('studentModal'));
      loadStudents();
    });


    async function loadStudents() {
      const res = await fetch(API_URL);
      const data = await res.json();
      renderTable(data);
    }

    function renderTable(students) {
      let html = "";
      students.forEach(s => {
        html += `<tr>
                <td>${s.name}</td>
                <td>${s.age}</td>
                <td>${s.className}</td>
                <td>${s.email}</td>
                <td>${s.phoneNumber}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick="editStudent('${s.id}')">Sửa</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteStudent('${s.id}')">Xóa</button>
                </td>
            </tr>`;
      });
      document.getElementById("studentTableBody").innerHTML = html;
    }


    async function searchStudent() {
      const name = document.getElementById("searchName").value;
      const res = await fetch(`${API_URL}/search?name=${name}`);
      const data = await res.json();
      renderTable(data);
    }


    async function deleteStudent(id) {
      if (confirm("Bạn có chắc muốn xóa sinh viên này?")) {

        await fetch(`${API_URL}/delete/${id}`, { method: 'POST' });
        loadStudents();
      }
    }


    async function editStudent(id) {
      const res = await fetch(`${API_URL}/${id}`);
      const s = await res.json();

      document.getElementById("studentId").value = s.id;
      document.getElementById("name").value = s.name;
      document.getElementById("age").value = s.age;
      document.getElementById("email").value = s.email;
      document.getElementById("className").value = s.className;
      document.getElementById("phoneNumber").value = s.phoneNumber;
      document.getElementById("address").value = s.address;

      document.getElementById("modalTitle").innerText = "Cập nhật sinh viên";
      studentModal.show();
    }

    function prepareAdd() {
      document.getElementById("studentId").value = "";
      document.querySelectorAll(".modal-body input").forEach(i => i.value = "");
      document.getElementById("modalTitle").innerText = "Thêm mới sinh viên";
    }


    async function saveStudent() {
      const id = document.getElementById("studentId").value;
      const student = {
        name: document.getElementById("name").value,
        age: parseInt(document.getElementById("age").value),
        email: document.getElementById("email").value,
        className: document.getElementById("className").value,
        phoneNumber: document.getElementById("phoneNumber").value,
        address: document.getElementById("address").value
      };

      let url = API_URL;
      let method = 'POST';

      if (id) {

        url = `${API_URL}/update/${id}`;
      }

      await fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(student)
      });

      studentModal.hide();
      loadStudents();
    }
  </script>
</body>

</html>
